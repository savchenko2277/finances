<div class="calc @@if(this.class){@@class}">
    <div class="calc__body container">
        <div class="calc__success success-section">
            <div class="success-section__content">
                <img loading="lazy" src="./img/icons/succes.webp" alt="" class="success-section__icon">
                <div class="success-section__info">
                    <h2 class="success-section__title title">
                        Спасибо! Данные успешно отправлены
                    </h2>
                    <p class="success-section__desc">
                        Наш менеджер свяжется с вами в ближайшее время
                    </p>
                </div>
            </div>
        </div>
        <form class="calc__form" action="send.php" method="POST">
            <div class="calc__hero">
                <h2>Рассчитайте платеж</h2>
                <div class="calc__grid">
                    <div class="calc__grid-item">
                        <label class="custom-label">
                            <h4 class="custom-label__title">Сумма займа</h4>
                            <div class="custom-input custom-input_calc">
                                <p class="custom-input__value"><span>50 000</span>₽</p>
                                <button disabled type="button" class="button-calc button-calc_minus"></button>
                                <button type="button" class="button-calc button-calc_plus"></button>
                            </div>
                            <p class="custom-label__error">
                                Пример текста ошибки
                            </p>
                        </label>
                    </div>
                    <div class="calc__grid-item">
                        <label class="custom-label">
                            <h4 class="custom-label__title">Срок займа</h4>
                            <div class="custom-input custom-input_calc">
                                <p class="custom-input__value"><span>3 месяца</span></p>
                                <button disabled type="button" class="button-calc button-calc_minus"></button>
                                <button type="button" class="button-calc button-calc_plus"></button>
                            </div>
                            <p class="custom-label__error">
                                Пример текста ошибки
                            </p>
                        </label>
                    </div>
                    <div class="calc__grid-item calc__grid-item_sum">
                        <label class="custom-label">
                            <h4 class="custom-label__title">Ежемесячный платеж</h4>
                            <div class="custom-input custom-input_calc">
                                <div class="calc__item-summary">
                                    <p data-calc="payment">16 666,67</p>
                                    <img loading="lazy" src="img/icons/ruble.svg" alt="" />
                                </div>
                            </div>
                            <p class="custom-label__error">
                                Пример текста ошибки
                            </p>
                        </label>
                    </div>
                    <div class="calc__grid-item">
                        <label class="custom-label">
                            <h4 class="custom-label__title">Номер телефона</h4>
                            <div class="custom-input">
                                <input required placeholder="+7" type="tel">
                            </div>
                            <p class="custom-label__error">
                                Пример текста ошибки
                            </p>
                        </label>
                    </div>
                    <div class="calc__grid-item">
                        <label class="custom-label">
                            <h4 class="custom-label__title">Как к вам обращаться?</h4>
                            <div class="custom-input">
                                <input placeholder="Имя" type="text">
                            </div>
                            <p class="custom-label__error">
                                Пример текста ошибки
                            </p>
                        </label>
                    </div>
                    <div class="calc__grid-item">
                        <button disabled class="calc__submit button button-blue button-arrow" type="submit">
                            <span>Оставить заявку</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="calc__bottom">
                <label class="custom-agree calc__agree">
                    <input type="checkbox" class="custom-agree__input custom-checkbox">
                    <p class="custom-agree__text">
                        Я даю согласие на <a href="#">обработку персональных данных</a>. <br> Подтверждаю ознакомление с <a href="#">пользовательским соглашением</a>
                    </p>
                </label>
                <label class="custom-agree calc__agree">
                    <input type="checkbox" class="custom-agree__input custom-checkbox">
                    <p class="custom-agree__text">
                       Я согласен(на) на информирование о продуктах, <br> сервисах, услугах и акциях и передачу соответствующих данных лицам, указанным в перечне
                    </p>
                </label>
            </div>
        </form>
    </div>
</div>
